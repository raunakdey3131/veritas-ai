apiVersion: apps/v1
kind: Deployment
metadata:
  name: claim-extraction
  namespace: veritas
spec:
  replicas: 12
  selector:
    matchLabels:
      app: claim-extraction
  template:
    metadata:
      labels:
        app: claim-extraction
    spec:
      containers:
      - name: claim-extraction
        image: veritas/claim-extraction:latest
        ports:
        - containerPort: 8010
        envFrom:
        - configMapRef:
            name: veritas-config
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8010
---
apiVersion: v1
kind: Service
metadata:
  name: claim-extraction
  namespace: veritas
spec:
  selector:
    app: claim-extraction
  ports:
  - port: 8010
    targetPort: 8010
