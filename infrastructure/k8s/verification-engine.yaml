apiVersion: apps/v1
kind: Deployment
metadata:
  name: verification-engine
  namespace: veritas
spec:
  replicas: 24
  selector:
    matchLabels:
      app: verification-engine
  template:
    metadata:
      labels:
        app: verification-engine
    spec:
      containers:
      - name: verification-engine
        image: veritas/verification-engine:latest
        ports:
        - containerPort: 8030
        envFrom:
        - configMapRef:
            name: veritas-config
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
          limits:
            cpu: "4"
            memory: "16Gi"
            nvidia.com/gpu: "1"
        readinessProbe:
          httpGet:
            path: /health
            port: 8030
---
apiVersion: v1
kind: Service
metadata:
  name: verification-engine
  namespace: veritas
spec:
  selector:
    app: verification-engine
  ports:
  - port: 8030
    targetPort: 8030
